<!-- Quantum Particles Animation -->
<canvas id="quantum-canvas"></canvas>
<script>
  const canvas = document.getElementById('quantum-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = []; // Clear existing
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.5,
        speedX: Math.random() * 0.4 - 0.2,
        speedY: Math.random() * 0.4 - 0.2,
        color: Math.random() > 0.5 ? '#00FF41' : '#FF4500' // Matrix Green or Burnt Orange
      });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      
      p.x += p.speedX;
      p.y += p.speedY;

      if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
      if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
    });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', init);
  init();
  animate();
</script>

<script>
// Redirect if already logged in
db.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});

const form     = document.getElementById('login-form');
const errEl    = document.getElementById('login-error');
const loginBtn = document.getElementById('login-btn');
const signupBtn= document.getElementById('signup-btn');

function showError(msg) {
  errEl.textContent = msg;
  errEl.classList.remove('hidden');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginBtn.textContent = 'Conectando...';
  loginBtn.disabled = true;
  errEl.classList.add('hidden');

  const email    = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) {
    showError('Email ou senha incorretos.');
    loginBtn.textContent = 'Acessar Conta';
    loginBtn.disabled = false;
  } else {
    window.location.href = 'dashboard.html';
  }
});

signupBtn.addEventListener('click', async () => {
  signupBtn.textContent = 'Criando...';
  signupBtn.disabled = true;
  errEl.classList.add('hidden');

  const email    = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  if (!email || !password) { showError('Preencha email e senha.'); signupBtn.textContent = 'Criar Conta'; signupBtn.disabled = false; return; }
  if (password.length < 6)  { showError('Senha mínimo 6 caracteres.'); signupBtn.textContent = 'Criar Conta'; signupBtn.disabled = false; return; }

  const { error } = await db.auth.signUp({ email, password });
  if (error) {
    showError(error.message);
    signupBtn.textContent = 'Criar Conta';
    signupBtn.disabled = false;
  } else {
    window.location.href = 'dashboard.html';
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
